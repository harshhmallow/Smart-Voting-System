{% extends "admin/base_site.html" %}

{% block content %}
<h1>Vote Counts by Candidate</h1>
<table>
    <thead>
        <tr>
            <th>Candidate</th>
            <th>Vote Count</th>
        </tr>
    </thead>
    <tbody>
        {% for vote in vote_counts %}
        <tr>
            <td>{{ vote.candidate }}</td>
            <td>{{ vote.count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
