<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .card {
            background:rgb(7, 48, 91);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 200px;
        }
        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Dashboard</h1>
        
        <div class="stats">
            <div class="card">
                <h2>Total Voters</h2>
                <p>{{ voters_count }}</p>
            </div>
            <div class="card">
                <h2>Total Votes</h2>
                <p>{{ votes_count }}</p>
            </div>
            <div class="card">
                <h2>Election Status</h2>
                <p>{{ election_status }}</p>
            </div>
        </div>

        <h2>Live Vote Count</h2>
        <canvas id="voteChart" width="400" height="200"></canvas>

        <script>
            var ctx = document.getElementById('voteChart').getContext('2d');
            var voteData = {
                labels: [{% for candidate in vote_data %}"{{ candidate.name }}",{% endfor %}],
                datasets: [{
                    label: 'Votes',
                    data: [{% for candidate in vote_data %}{{ candidate.votes }},{% endfor %}],
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffcd56', '#4bc0c0'],
                    borderColor: '#fff',
                    borderWidth: 1
                }]
            };

            var myChart = new Chart(ctx, {
                type: 'bar',
                data: voteData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        </script>

    </div>

</body>
</html>
