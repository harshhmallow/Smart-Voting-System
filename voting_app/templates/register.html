<!DOCTYPE html>
<html>
<head>
    <title>Register Voter</title>
    <script>
        let videoElement;
        let canvasElement;
        let stream;
        let framesCaptured = 0;
        const totalFrames = 51; // Number of frames to capture
        const captureAfterFrame = 2; // Capture every 2nd frame
        let framesData = []; // Array to store captured frames

        // Start the webcam
        async function startWebcam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement = document.getElementById('webcam');
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
            } catch (error) {
                console.error('Error accessing webcam:', error);
                alert('Error accessing webcam. Please allow camera permissions.');
            }
        }

        // Capture frames
        async function captureFrames() {
            if (framesCaptured >= totalFrames) {
                stopWebcam();
                sendFramesToServer();
                return;
            }

            canvasElement = document.createElement('canvas');
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            const context = canvasElement.getContext('2d');
            context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            // Capture every 2nd frame
            if (framesCaptured % captureAfterFrame === 0) {
                const imageData = canvasElement.toDataURL('image/jpeg');
                framesData.push(imageData);
            }

            framesCaptured++;
            requestAnimationFrame(captureFrames);
        }

        // Send frames to the server
        async function sendFramesToServer() {
            const ktuId = document.getElementById('ktu_id').value;
            if (!ktuId) {
                alert('KTU ID is required.');
                return;
            }

            const response = await fetch('/register_voter/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
                body: JSON.stringify({ ktu_id: ktuId, frames_data: framesData }),
            });

            const result = await response.json();
            alert(result.message);
        }

        // Stop the webcam
        function stopWebcam() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                videoElement.style.display = 'none';
            }
        }
    </script>
</head>
<body>
    <h2>Register Voter</h2>
    <form id="register-form">
        {% csrf_token %}
        <label for="ktu_id">KTU ID:</label>
        <input type="text" id="ktu_id" name="ktu_id" required>
        <br><br>
        <button type="button" onclick="startWebcam()">Start Camera</button>
        <button type="button" onclick="captureFrames()">Capture Frames</button>
    </form>
    <video id="webcam" autoplay style="display: none;"></video>
    <p id="capture-message"></p>
</body>
</html>
