<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>Candidate</th>
                <th>Vote Count</th>
            </tr>
        </thead>
        <tbody>
            {% for vote in vote_counts %}
            <tr>
                <td>{{ vote.candidate }}</td>
                <td>{{ vote.count }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
